name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install offline-contract validators
        run: python -m pip install --disable-pip-version-check jsonschema PyYAML
      - name: Verify source, contracts, docs, plugins, determinism and interfaces
        run: make verify
      - name: Race detector
        run: make test-race
      - name: Generate demonstration atlas
        run: make demo
      - name: Docker build
        run: docker build -t rkc:ci .
      - name: Upload demonstration atlas
        uses: actions/upload-artifact@v4
        with:
          name: rkc-demo
          path: |
            dist/demo
            dist/demo-*.txt
          if-no-files-found: error
