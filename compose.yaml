services:
  rkc:
    build: .
    working_dir: /workspace
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    volumes:
      - ./:/workspace:ro
      - rkc-output:/output
      - rkc-state:/state
    command:
      - scan
      - --out
      - /output
      - --state-dir
      - /state
      - --force
      - /workspace
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
volumes:
  rkc-output: {}
  rkc-state: {}
